<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect & Company | 채용 지원 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 수퍼베이스 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- EmailJS 라이브러리 추가 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 border-b pb-4">입사 지원서</h1>
        
        <form id="applicationForm" class="space-y-8">
            <div class="flex flex-col md:flex-row gap-8">
                <!-- 기본 정보 -->
                <div class="flex-grow space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">이름</label>
                            <input type="text" id="inputName" required class="w-full mt-1 p-3 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">이메일</label>
                            <input type="email" id="inputEmail" required class="w-full mt-1 p-3 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">전화번호</label>
                            <input type="tel" id="inputPhone" required class="w-full mt-1 p-3 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">희망연봉 (만원)</label>
                            <input type="number" id="inputSalary" class="w-full mt-1 p-3 border rounded-md">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">지원 직무</label>
                            <select id="inputJob" class="w-full mt-1 p-3 border rounded-md bg-gray-50 pointer-events-none">
                                <option value="HRD 컨설턴트" selected>HRD 컨설턴트</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 증명사진 -->
                <div class="flex-shrink-0">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">증명사진</label>
                    <div id="photoFrame" class="w-40 h-52 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 overflow-hidden" onclick="document.getElementById('photoInput').click()">
                        <img id="photoPreview" class="w-full h-full object-cover hidden">
                        <span id="photoPlaceholder" class="text-gray-400 text-xs text-center p-2">클릭하여 사진 등록</span>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                </div>
            </div>

            <!-- 동적 학력 추가 섹션 -->
            <div class="pt-6 border-t mt-4">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-lg font-bold text-gray-800">학력 사항</label>
                    <button type="button" onclick="addEduRow()" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-sm font-bold hover:bg-indigo-200">+ 학력 추가</button>
                </div>
                <div id="eduContainer" class="space-y-3"></div>
            </div>

            <!-- 동적 경력 추가 섹션 -->
            <div class="pt-6 border-t mt-4">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-lg font-bold text-gray-800">경력 사항 <span class="text-xs font-normal text-gray-500">(신입은 비워두세요)</span></label>
                    <button type="button" onclick="addExpBlock()" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-sm font-bold hover:bg-indigo-200">+ 경력 추가</button>
                </div>
                <div id="expContainer" class="space-y-4"></div>
            </div>

            <div class="space-y-6 pt-6 border-t">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">1. HRD분야에 지원하게 된 동기는 무엇인가요?</label>
                    <textarea id="inputQ1" rows="5" class="w-full mt-2 p-4 border rounded-md" required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">2. HRD 컨설턴트는 어떤 일을 하는 것이라 생각하는 가요? 본인이 그 일을 잘 할 수 있다고 판단하는 강점이 무엇인가요?</label>
                    <textarea id="inputQ2" rows="5" class="w-full mt-2 p-4 border rounded-md" required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">3. 결과의 성패유무와 관련없이 본인이 자신의 한계라 생각할 정도로 끝까지 노력했던 경험은 무엇인가요?</label>
                    <textarea id="inputQ3" rows="5" class="w-full mt-2 p-4 border rounded-md" required></textarea>
                </div>
            </div>

            <div class="text-center pt-8">
                <button type="submit" id="submitBtn" class="bg-indigo-600 text-white px-12 py-4 rounded-full font-bold text-lg hover:bg-indigo-700 transition shadow-lg w-full md:w-auto">제출하기</button>
            </div>
        </form>
    </div>

    <script>
        // ★ 1. 수퍼베이스 키 입력 (기존과 동일) ★
        const SUPABASE_URL = 'https://zjlqbwmzfuedyktbjpaf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_yoM1ax2_waeizKZSaK6o6w_YEGgYf0M';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ★ 2. EmailJS Public Key 입력 ★
        emailjs.init("A9xQtn3nGIlqSDJa_sDRY"); 

        let selectedPhotoFile = null;
        function previewImage(input) {
            const preview = document.getElementById('photoPreview');
            const placeholder = document.getElementById('photoPlaceholder');
            if (input.files && input.files[0]) {
                selectedPhotoFile = input.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(selectedPhotoFile);
            }
        }

        function addEduRow() {
            const container = document.getElementById('eduContainer');
            const row = document.createElement('div');
            row.className = "edu-row grid grid-cols-2 md:grid-cols-6 gap-2 items-center bg-gray-50 p-2 rounded border border-gray-200";
            row.innerHTML = `
                <select class="edu-degree p-2 border rounded text-sm bg-white">
                    <option value="학사">학사</option><option value="석사">석사</option><option value="박사">박사</option><option value="전문학사">전문학사</option>
                </select>
                <input type="text" placeholder="학교명" class="edu-school p-2 border rounded text-sm md:col-span-2">
                <input type="text" placeholder="전공명" class="edu-major p-2 border rounded text-sm">
                <input type="text" placeholder="기간 (예: 18.03~22.02)" class="edu-period p-2 border rounded text-sm">
                <div class="flex gap-2">
                    <select class="edu-status p-2 border rounded text-sm bg-white flex-grow">
                        <option value="졸업">졸업</option><option value="졸업예정">졸업예정</option><option value="수료">수료</option><option value="중퇴">중퇴</option>
                    </select>
                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-500 hover:bg-red-100 px-2 rounded font-bold">X</button>
                </div>
            `;
            container.appendChild(row);
        }

        function addExpBlock() {
            const container = document.getElementById('expContainer');
            const block = document.createElement('div');
            block.className = "exp-block bg-gray-50 p-4 rounded border border-gray-200 relative";
            block.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-3 text-red-500 hover:text-red-700 font-bold text-sm">삭제 X</button>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3 mt-4">
                    <input type="text" placeholder="회사명" class="exp-company p-2 border rounded text-sm">
                    <input type="text" placeholder="직급 (예: 대리)" class="exp-title p-2 border rounded text-sm">
                    <input type="text" placeholder="담당업무 (예: 영업기획)" class="exp-role p-2 border rounded text-sm">
                    <input type="text" placeholder="기간 (예: 21.03~24.01)" class="exp-period p-2 border rounded text-sm">
                </div>
                <textarea rows="3" placeholder="경력사항 상세 (진행한 프로젝트, 성과 등을 자유롭게 작성해주세요)" class="exp-details w-full p-3 border rounded-md text-sm"></textarea>
            `;
            container.appendChild(block);
        }

        addEduRow(); addExpBlock();

        document.getElementById('applicationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "제출 중...";
            submitBtn.disabled = true;

            try {
                let photoUrl = '';
                if (selectedPhotoFile) {
                    const fileExt = selectedPhotoFile.name.split('.').pop();
                    const fileName = `${Date.now()}_${document.getElementById('inputName').value}.${fileExt}`;
                    const { error: uploadError } = await supabaseClient.storage.from('photos').upload(fileName, selectedPhotoFile);
                    if (uploadError) throw uploadError;
                    const { data: publicUrlData } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
                    photoUrl = publicUrlData.publicUrl;
                }

                let eduArr = [];
                document.querySelectorAll('.edu-row').forEach(row => {
                    const school = row.querySelector('.edu-school').value;
                    if(school) eduArr.push(`[${row.querySelector('.edu-degree').value}] ${school} (${row.querySelector('.edu-major').value}) | ${row.querySelector('.edu-period').value} | ${row.querySelector('.edu-status').value}`);
                });

                let expArr = [];
                document.querySelectorAll('.exp-block').forEach(block => {
                    const comp = block.querySelector('.exp-company').value;
                    if(comp) expArr.push(`■ ${comp} / ${block.querySelector('.exp-title').value} / ${block.querySelector('.exp-role').value} (${block.querySelector('.exp-period').value})\n- 상세: ${block.querySelector('.exp-details').value}`);
                });

                const finalData = {
                    name: document.getElementById('inputName').value,
                    email: document.getElementById('inputEmail').value,
                    phone: document.getElementById('inputPhone').value,
                    salary: document.getElementById('inputSalary').value,
                    job: document.getElementById('inputJob').value,
                    q1: document.getElementById('inputQ1').value,
                    q2: document.getElementById('inputQ2').value,
                    q3: document.getElementById('inputQ3').value,
                    education_history: eduArr.length > 0 ? eduArr.join('\n') : '입력 안함',
                    experience_history: expArr.length > 0 ? expArr.join('\n\n') : '신입 / 경력 없음',
                    photo_url: photoUrl
                };
                
                // 1. 수퍼베이스에 데이터 저장
                const { error: insertError } = await supabaseClient.from('applicants').insert([finalData]);
                if (insertError) throw insertError;

                // ★ 3. EmailJS로 메일 전송 (여기에 Service ID와 Template ID 입력) ★
                await emailjs.send("service_suvree6", "template_5g01hpk", {
                    name: finalData.name,
                    email: finalData.email,
                    phone: finalData.phone
                });

                alert("지원서 제출이 완료되었습니다. 감사합니다!");
                location.reload(); 

            } catch (error) {
                console.error('Error:', error);
                alert("제출 중 오류가 발생했습니다. 다시 시도해주세요.");
            } finally {
                submitBtn.innerText = "제출하기";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
